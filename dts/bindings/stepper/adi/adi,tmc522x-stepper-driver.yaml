compatible: "adi,tmc522x-stepper-driver"

include:
  - name: stepper-driver.yaml
  - name: adi,trinamic-stallguard.yaml
    property-allowlist:
      - stallguard2-threshold

properties:
  idx:
    type: int
    required: true
    description: |
      Motor index (0-based). For TMC522x with single motor, use 0.

  # Current Control Settings
  ihold:
    type: int
    default: 0
    description: |
      Hold current (0=1/32...31=32/32).
      Standstill current. In combination with StealthChop mode, setting IHOLD=0
      allows to choose freewheeling or coil short circuit for motor stand still.

  irun:
    type: int
    default: 0
    description: |
      Motor run current (0=1/32...31=32/32).
      Hint: Choose sense resistors in a way, that normal IRUN is 16 to 31
      for best microstep performance.

  irundelay:
    type: int
    default: 4
    description: |
      IHOLD_IRUN register bits 27:24.
      Controls the number of clock cycles for motor power up before a motion
      is started. The smooth transition avoids a motor jerk upon power up.
      When powering up at standstill, IRUNDELAY will be used until IHOLD is
      reached in case IHOLDDELAY != 0.

      0:    Instant jump to IRUN on start of a motion
      1-15: Delay per current increase step = IRUNDELAY x 512 x t_clk

      Example at 16 MHz clock (t_clk = 62.5 ns):
        4 = 2048 x 62.5 ns = 128 us per current increment step

  iholddelay:
    type: int
    default: 3
    description: |
      IHOLD_IRUN register bits 19:16.
      Controls the number of clock cycles for motor power down after a motion
      as soon as standstill is detected (stst=1) and TPOWERDOWN has expired.
      The smooth transition avoids a motor jerk upon power down.

      0:    Instant reduction to IHOLD current after TPOWERDOWN has expired
      1-15: One current decrement every IHOLDDELAY x 2^18 x t_clk

      Example at 16 MHz clock (t_clk = 62.5 ns):
        3 = 3 x 262144 x 62.5 ns = ~49 ms per current decrement step

  tpowerdown:
    type: int
    default: 10
    description: |
      Delay before reducing to standby current after motor stops.
      Time since last step until current is reduced to hold value.
      Formula: tpowerdown * 2^18 / f_clk seconds.
      Default 10 ≈ 2.6 seconds @ 16 MHz clock. Range: 0-255.

  # Chopper Configuration
  toff:
    type: int
    default: 5
    description: |
      Chopper off-time (CRITICAL parameter - must be non-zero!).
      Duration of slow decay phase. Determines chopper frequency.
      0 = driver disabled
      1 = shortest off-time, highest frequency
      15 = longest off-time, lowest frequency
      Default: 5 (balanced performance)
      Chopper freq ≈ f_clk / (32 * toff)

  tbl:
    type: int
    default: 2
    description: |
      Comparator blank time (noise filter).
      Blanking time to prevent false current measurements due to switching noise.
      0 = 16 clocks (shortest)
      1 = 24 clocks
      2 = 36 clocks (default)
      3 = 54 clocks (longest)

  hstrt:
    type: int
    default: 4
    description: |
      Hysteresis start value (chopper tuning parameter).
      Controls the hysteresis start value for the current regulation.
      In standard mode (CHM=0): TFD[2:0] offset (0-7)
      Higher values = faster current regulation response
      Default: 4 (balanced performance)

  hend:
    type: int
    default: 0
    description: |
      Hysteresis end offset (chopper tuning parameter).
      Controls the width of the hysteresis window.
      Range: -3 to +12 (encoded as 0-15 in register)
      Lower values = narrower hysteresis, lower current ripple
      Higher values = wider hysteresis, higher current ripple
      Default: 0 (narrowest hysteresis)

  # Driver Configuration
  fs-gain:
    type: int
    default: 0
    description: |
      Full-scale current sense resistor gain setting.
      Adjusts the amplifier gain for current sensing.
      0 = normal gain (default)
      1-3 = increased gain settings

  fs-sense:
    type: int
    default: 0
    description: |
      Full-scale current sense resistor selection.
      Configures the reference resistor value for current measurement.
      0 = default setting
      1-3 = alternative settings

  global-scaler:
    type: int
    default: 231
    description: |
      Global current scaler (8-bit value: 0-255).
      Scales the motor current globally. Can be used for dynamic
      current adjustment without changing IRUN/IHOLD.
      0 = motor disabled, 255 = maximum current.
      Formula: I_actual = (global-scaler / 256) * I_configured
      Default 231 ≈ 90% of configured current.
